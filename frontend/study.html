<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/study" class="active">Study</a></li>
      <li><a href="/review">Review</a></li>
      <li><a href="/settings">Settings</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="content">
      <h1>Add New Word</h1>
      <div id="message" style="display:none;"></div>

      <form id="addWordForm" onsubmit="handleAddWord(event)">
        <div class="form-group">
          <label for="word">Word *</label>
          <input type="text" id="word" required placeholder="Enter an English word">
        </div>

        <div class="form-group">
          <label for="phonetic">Phonetic</label>
          <input type="text" id="phonetic" placeholder="Example: /ˈælɡərɪðəm/">
        </div>

        <div class="form-group">
          <label>Translations *</label>
          <div id="translationsContainer" style="margin-bottom:10px;">
            <div style="display:flex;gap:10px;margin-bottom:10px;">
              <input type="text" class="translation-input" placeholder="Meaning" required>
              <select class="pos-select" style="flex:0 0 auto;width:120px;">
                <option value="noun">Noun</option>
                <option value="verb">Verb</option>
                <option value="adjective">Adjective</option>
                <option value="adverb">Adverb</option>
                <option value="other">Other</option>
              </select>
              <button type="button" onclick="removeTranslation(this)" class="btn btn-outline" style="flex:0 0 auto;padding:8px 12px;color:#f44336;border-color:#f44336;">Remove</button>
            </div>
          </div>
          <button type="button" onclick="addTranslation()" class="btn btn-outline" style="color:#4CAF50;border-color:#4CAF50;padding:8px 12px;">Add Translation</button>
        </div>

        <div class="form-group">
          <label>Examples</label>
          <div id="examplesContainer" style="margin-bottom:10px;">
            <div style="margin-bottom:15px;padding:15px;background-color:#f9f9f9;border-radius:4px;">
              <input type="text" class="example-sentence" placeholder="English example" style="width:100%;margin-bottom:10px;padding:8px;border:1px solid #ddd;border-radius:3px;font-family:monospace;">
              <input type="text" class="example-translation" placeholder="Translation" style="width:100%;margin-bottom:10px;padding:8px;border:1px solid #ddd;border-radius:3px;">
              <select class="example-domain" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:3px;margin-bottom:10px;">
                <option value="Computer Science">Computer Science</option>
                <option value="Electrical Engineering">Electrical Engineering</option>
                <option value="Network">Network</option>
                <option value="Database">Database</option>
                <option value="Software Engineering">Software Engineering</option>
                <option value="Hardware">Hardware</option>
                <option value="Other">Other</option>
              </select>
              <button type="button" onclick="removeExample(this)" class="btn btn-outline" style="color:#f44336;border-color:#f44336;padding:6px 12px;font-size:12px;">Remove</button>
            </div>
          </div>
          <button type="button" onclick="addExample()" class="btn btn-outline" style="color:#4CAF50;border-color:#4CAF50;padding:8px 12px;">Add Example</button>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary">Save Word</button>
          <button type="reset" class="btn btn-outline" onclick="resetWordForm()">Reset Form</button>
          <a href="/review" class="btn btn-secondary">Go To Review</a>
        </div>
      </form>

      <div style="margin-top:50px;padding-top:50px;border-top:2px solid #eee;">
        <h2>Recent Words (Last 20)</h2>
        <div id="audioVerificationStatus" style="margin:12px 0;font-size:12px;color:#666;"></div>
        <div id="wordsListContainer" style="margin-top:20px;"></div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const studyAudioPlayer = new Audio();
    studyAudioPlayer.preload = 'auto';

    function addTranslation() {
      const c = document.getElementById('translationsContainer');
      const div = document.createElement('div');
      div.style.display = 'flex';
      div.style.gap = '10px';
      div.style.marginBottom = '10px';
      div.innerHTML = `
        <input type="text" class="translation-input" placeholder="Meaning" required>
        <select class="pos-select" style="flex:0 0 auto;width:120px;">
          <option value="noun">Noun</option>
          <option value="verb">Verb</option>
          <option value="adjective">Adjective</option>
          <option value="adverb">Adverb</option>
          <option value="other">Other</option>
        </select>
        <button type="button" onclick="removeTranslation(this)" class="btn btn-outline" style="flex:0 0 auto;padding:8px 12px;color:#f44336;border-color:#f44336;">Remove</button>
      `;
      c.appendChild(div);
    }

    function removeTranslation(btn) { btn.parentElement.remove(); }

    function addExample() {
      const c = document.getElementById('examplesContainer');
      const div = document.createElement('div');
      div.style.marginBottom = '15px';
      div.style.padding = '15px';
      div.style.backgroundColor = '#f9f9f9';
      div.style.borderRadius = '4px';
      div.innerHTML = `
        <input type="text" class="example-sentence" placeholder="English example" style="width:100%;margin-bottom:10px;padding:8px;border:1px solid #ddd;border-radius:3px;font-family:monospace;">
        <input type="text" class="example-translation" placeholder="Translation" style="width:100%;margin-bottom:10px;padding:8px;border:1px solid #ddd;border-radius:3px;">
        <select class="example-domain" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:3px;margin-bottom:10px;">
          <option value="Computer Science">Computer Science</option>
          <option value="Electrical Engineering">Electrical Engineering</option>
          <option value="Network">Network</option>
          <option value="Database">Database</option>
          <option value="Software Engineering">Software Engineering</option>
          <option value="Hardware">Hardware</option>
          <option value="Other">Other</option>
        </select>
        <button type="button" onclick="removeExample(this)" class="btn btn-outline" style="color:#f44336;border-color:#f44336;padding:6px 12px;font-size:12px;">Remove</button>
      `;
      c.appendChild(div);
    }

    function removeExample(btn) { btn.parentElement.remove(); }

    function showMessage(text, type) {
      const div = document.getElementById('message');
      div.className = `alert alert-${type}`;
      div.textContent = text;
      div.style.display = 'block';
      setTimeout(() => { div.style.display = 'none'; }, 5000);
    }

    function resetWordForm() {
      document.getElementById('translationsContainer').innerHTML = `
        <div style="display:flex;gap:10px;margin-bottom:10px;">
          <input type="text" class="translation-input" placeholder="Meaning" required>
          <select class="pos-select" style="flex:0 0 auto;width:120px;">
            <option value="noun">Noun</option>
            <option value="verb">Verb</option>
            <option value="adjective">Adjective</option>
            <option value="adverb">Adverb</option>
            <option value="other">Other</option>
          </select>
          <button type="button" onclick="removeTranslation(this)" class="btn btn-outline" style="flex:0 0 auto;padding:8px 12px;color:#f44336;border-color:#f44336;">Remove</button>
        </div>`;
      document.getElementById('examplesContainer').innerHTML = `
        <div style="margin-bottom:15px;padding:15px;background-color:#f9f9f9;border-radius:4px;">
          <input type="text" class="example-sentence" placeholder="English example" style="width:100%;margin-bottom:10px;padding:8px;border:1px solid #ddd;border-radius:3px;font-family:monospace;">
          <input type="text" class="example-translation" placeholder="Translation" style="width:100%;margin-bottom:10px;padding:8px;border:1px solid #ddd;border-radius:3px;">
          <select class="example-domain" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:3px;margin-bottom:10px;">
            <option value="Computer Science">Computer Science</option>
            <option value="Electrical Engineering">Electrical Engineering</option>
            <option value="Network">Network</option>
            <option value="Database">Database</option>
            <option value="Software Engineering">Software Engineering</option>
            <option value="Hardware">Hardware</option>
            <option value="Other">Other</option>
          </select>
          <button type="button" onclick="removeExample(this)" class="btn btn-outline" style="color:#f44336;border-color:#f44336;padding:6px 12px;font-size:12px;">Remove</button>
        </div>`;
    }

    function collectTranslations() {
      const inputs = document.querySelectorAll('.translation-input');
      const pos = document.querySelectorAll('.pos-select');
      const translations = [];
      inputs.forEach((input, i) => {
        if (input.value.trim()) translations.push({ meaning: input.value.trim(), part_of_speech: pos[i].value });
      });
      return translations;
    }

    function collectExamples() {
      const s = document.querySelectorAll('.example-sentence');
      const t = document.querySelectorAll('.example-translation');
      const d = document.querySelectorAll('.example-domain');
      const examples = [];
      s.forEach((input, i) => {
        if (input.value.trim() && t[i].value.trim()) {
          examples.push({ sentence: input.value.trim(), translation: t[i].value.trim(), domain: d[i].value });
        }
      });
      return examples;
    }

    async function speakWithBrowser(word) {
      if (!('speechSynthesis' in window)) return false;
      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en'));
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        return true;
      } catch (_e) {
        return false;
      }
    }

    async function verifyAudioConnectivity(word) {
      const el = document.getElementById('audioVerificationStatus');
      if (!el) return;
      el.textContent = 'Verifying...';
      el.style.color = '#666';
      const result = await APIClient.verifyAudioConnectivity(word);
      if (result.success && result.data.data) {
        const data = result.data.data;
        if (data.reachable) {
          el.textContent = `Google TTS verification: reachable (${data.status_code})`;
          el.style.color = '#2e7d32';
        } else {
          el.textContent = `Google TTS verification: unreachable (${data.message})`;
          el.style.color = '#c62828';
        }
      } else {
        el.textContent = `Google TTS verification: failed (${result.error || 'unknown error'})`;
        el.style.color = '#c62828';
      }
    }

    async function playAudioFallback(word) {
      const result = await APIClient.getAudioInfo(word);
      if (!result.success) throw new Error(result.error || 'audio lookup failed');
      const data = result.data.data || {};
      const audioUrl = data.audio_url_us || data.audio_url || data.audio_url_uk;
      if (!audioUrl) throw new Error('no audio url');
      studyAudioPlayer.src = audioUrl;
      studyAudioPlayer.load();
      await studyAudioPlayer.play();
    }

    async function playWordAudio(word) {
      if (!word) return;
      await verifyAudioConnectivity(word);
      try {
        await playAudioFallback(word);
      } catch (error) {
        const browserSpoken = await speakWithBrowser(word);
        if (!browserSpoken) showMessage('Playback failed: ' + error.message, 'error');
      }
    }

    async function handleAddWord(event) {
      event.preventDefault();
      try {
        const word = document.getElementById('word').value.trim();
        const phonetic = document.getElementById('phonetic').value.trim();
        const translations = collectTranslations();
        const examples = collectExamples();
        if (!translations.length) {
          showMessage('Please add at least one translation.', 'error');
          return;
        }
        const result = await APIClient.addWord({ word, phonetic, translations, examples });
        if (result.success) {
          showMessage(`Word "${word}" saved.`, 'success');
          document.getElementById('addWordForm').reset();
          resetWordForm();
          loadWordsList();
        } else {
          showMessage('Add word failed: ' + result.error, 'error');
        }
      } catch (error) {
        showMessage('Add word failed: ' + error.message, 'error');
      }
    }

    async function handleDeleteWord(wordId, wordText) {
      if (!window.confirm(`Delete "${wordText}"? This will also remove its review record.`)) return;
      try {
        const result = await APIClient.deleteWord(wordId);
        if (result.success) {
          showMessage(`Deleted "${wordText}".`, 'success');
          loadWordsList();
        } else {
          showMessage('Delete failed: ' + result.error, 'error');
        }
      } catch (error) {
        showMessage('Delete failed: ' + error.message, 'error');
      }
    }

    function renderWordCard(word) {
      const safeWord = encodeURIComponent(word.word || '');
      const translationsHtml = (word.translations || []).map(t => `<p style="margin:5px 0;color:#666;">• ${t.meaning}</p>`).join('');
      return `
        <div class="word-card">
          <div class="word-header">
            <div>
              <div class="word-text">${word.word || ''}</div>
              <div class="word-phonetic">${word.phonetic || ''}</div>
            </div>
            <div><span style="color:#999;font-size:12px;">Added ${word.added_date || ''}</span></div>
          </div>
          ${translationsHtml}
          <div style="margin-top:12px;">
            <button type="button" class="btn btn-secondary" onclick="playWordAudio(decodeURIComponent('${safeWord}'))" style="padding:6px 12px;font-size:12px;margin-right:8px;">Play Audio</button>
            <button type="button" class="btn btn-outline" onclick="handleDeleteWord('${word.id}', decodeURIComponent('${safeWord}'))" style="color:#f44336;border-color:#f44336;padding:6px 12px;font-size:12px;">Delete Word</button>
          </div>
        </div>`;
    }

    async function loadWordsList() {
      try {
        const result = await APIClient.getAllWords();
        if (!result.success) throw new Error(result.error);
        const words = result.data.data.slice(-20).reverse();
        const container = document.getElementById('wordsListContainer');
        container.innerHTML = words.length ? words.map(renderWordCard).join('') : '<div class="empty-state"><p>No words yet.</p></div>';
      } catch (error) {
        showMessage('Load words failed: ' + error.message, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
      loadWordsList();
    });
  </script>
</body>
</html>
