<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/study">Study</a></li>
      <li><a href="/review?mode=new">Study Today's Words</a></li>
      <li><a href="/review" class="active">Review</a></li>
      <li><a href="/settings">Settings</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="content">
      <h1 id="reviewTitle">Today's Review Queue</h1>

      <div style="background-color:#f0f8f0;padding:15px;border-radius:4px;margin:20px 0;display:none;" id="progressInfo">
        <p style="margin:0;">Completed <strong id="completedCount">0</strong> / <strong id="totalCount">0</strong> words</p>
      </div>

      <div id="loadingState" class="loading" style="display:none;">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>

      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-state-icon">Done</div>
        <div class="empty-state-title" id="emptyStateTitle">No words due today</div>
        <p id="emptyStateMessage">Today's review queue is empty.</p>
        <a href="/study" class="btn btn-primary" style="margin-top:20px;">Add New Word</a>
      </div>

      <div id="reviewContainer" style="display:none;">
        <div class="review-card">
          <div class="word" id="reviewWord"></div>
          <div class="phonetic" id="reviewPhonetic"></div>
          <button id="playAudioBtn" class="btn btn-secondary" style="margin:15px 0;">Play Audio</button>
          <div id="audioVerificationStatus" style="margin-top:-5px;margin-bottom:10px;font-size:12px;color:#666;"></div>
          <audio id="audioPlayer" style="display:none;"></audio>
          <div class="translations" id="reviewTranslations"></div>
          <div class="examples" id="reviewExamples" style="display:none;">
            <h4 style="margin-bottom:10px;">Examples</h4>
            <div id="examplesContent"></div>
          </div>
          <div class="proficiency-buttons">
            <button onclick="submitReview('unfamiliar')" class="proficiency-btn unfamiliar">Unfamiliar</button>
            <button onclick="submitReview('familiar')" class="proficiency-btn familiar">Familiar</button>
            <button onclick="submitReview('practiced')" class="proficiency-btn practiced">Practiced</button>
            <button onclick="submitReview('mastered')" class="proficiency-btn mastered">Mastered</button>
          </div>
        </div>

        <div style="margin-top:30px;padding:20px;background-color:#f5f5f5;border-radius:4px;">
          <h3>Progress</h3>
          <div style="margin-top:10px;">
            <div>Reviewed: <strong id="reviewedCount">0</strong></div>
            <div>Remaining: <strong id="remainingCount">0</strong></div>
            <div style="margin-top:10px;">
              <div style="background-color:#ddd;border-radius:10px;height:20px;overflow:hidden;">
                <div id="progressBar" style="background-color:#4CAF50;height:100%;width:0%;transition:width 0.3s;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let currentReviewList = [];
    let currentIndex = 0;
    const params = new URLSearchParams(window.location.search);
    const reviewMode = params.get('mode') === 'new' ? 'new' : 'review';
    const focusWordId = params.get('word_id');
    const dailyScores = new Map();
    const dailyThreshold = 2;
    const requeueGapByLevel = {
      unfamiliar: 2,
      familiar: 3,
      practiced: 0,
      mastered: 0
    };
    const scoreByLevel = {
      unfamiliar: 0.5,
      familiar: 1,
      practiced: 2,
      mastered: 3
    };

    function getReviewAudioPlayer() {
      return document.getElementById('audioPlayer');
    }

    async function speakWithBrowser(word) {
      if (!('speechSynthesis' in window)) return false;
      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en'));
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        return true;
      } catch (_e) {
        return false;
      }
    }

    async function verifyAudioConnectivity(word) {
      const el = document.getElementById('audioVerificationStatus');
      if (!el) return;
      el.textContent = 'Verifying...';
      el.style.color = '#666';
      const result = await APIClient.verifyAudioConnectivity(word);
      if (result.success && result.data.data) {
        const data = result.data.data;
        if (data.reachable) {
          el.textContent = `${data.source || 'Audio'}: reachable (${data.status_code})`;
          el.style.color = '#2e7d32';
        } else {
          el.textContent = `${data.source || 'Audio'}: unreachable (${data.message})`;
          el.style.color = '#c62828';
        }
      } else {
        el.textContent = `Audio verification: failed (${result.error || 'unknown error'})`;
        el.style.color = '#c62828';
      }
    }

    async function playAudioFallback(word) {
      const result = await APIClient.getAudioInfo(word);
      if (!result.success) throw new Error(result.error || 'audio lookup failed');
      const data = result.data.data || {};
      const audioUrl = data.audio_url_us || data.audio_url || data.audio_url_uk;
      if (!audioUrl) throw new Error('no audio url');
      const player = getReviewAudioPlayer();
      player.src = audioUrl;
      player.load();
      await player.play();
    }

    async function playWordAudio(word) {
      if (!word) return;
      await verifyAudioConnectivity(word);
      try {
        await playAudioFallback(word);
      } catch (error) {
        const browserSpoken = await speakWithBrowser(word);
        if (!browserSpoken) alert('Playback failed: ' + error.message);
      }
    }

    async function loadReviewList() {
      const loadingState = document.getElementById('loadingState');
      loadingState.style.display = 'block';
      try {
        configureReviewModeText();
        const result = reviewMode === 'new'
          ? await APIClient.getTodayNewWords()
          : await APIClient.getTodayReviewList();
        const reviews = result.success ? result.data.data : [];
        if (reviews.length > 0) {
          currentReviewList = reviews;
          if (focusWordId) {
            currentReviewList.sort((a, b) => {
              if (a.word_id === focusWordId) return -1;
              if (b.word_id === focusWordId) return 1;
              return 0;
            });
          }
          currentIndex = 0;
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('emptyState').style.display = 'none';
          document.getElementById('reviewContainer').style.display = 'block';
          document.getElementById('progressInfo').style.display = 'block';
          document.getElementById('totalCount').textContent = currentReviewList.length;
          displayCurrentWord();
        } else {
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('reviewContainer').style.display = 'none';
          document.getElementById('emptyState').style.display = 'block';
        }
      } catch (error) {
        document.getElementById('loadingState').style.display = 'none';
        alert('Load review list failed: ' + error.message);
      }
    }

    function configureReviewModeText() {
      const isNewMode = reviewMode === 'new';
      document.getElementById('reviewTitle').textContent = isNewMode
        ? "Study Today's Words"
        : "Today's Review Queue";
      document.getElementById('emptyStateTitle').textContent = isNewMode
        ? "No new words to study"
        : "No words due today";
      document.getElementById('emptyStateMessage').textContent = isNewMode
        ? "Today's new-word queue is empty. New words leave this source list after their first rating."
        : "Today's review queue is empty.";
    }

    function displayCurrentWord() {
      if (currentIndex >= currentReviewList.length) {
        showCompletionMessage();
        return;
      }

      const review = currentReviewList[currentIndex];
      const word = review.word_detail || {};
      const definitions = (word.translations || []).slice(0, 2);
      const remainingDefinitions = Math.max((word.translations || []).length - definitions.length, 0);
      const examples = (word.examples || []).filter(e => (e.sentence || '').trim()).slice(0, 2);

      document.getElementById('reviewWord').textContent = word.word || '';
      document.getElementById('reviewPhonetic').textContent = word.phonetic || '';
      document.getElementById('reviewTranslations').innerHTML = definitions.length
        ? definitions.map(t => `<p>- ${t.meaning} <small>(${t.part_of_speech})</small></p>`).join('')
        : '<p style="color:#999;">No definition yet.</p>';

      if (remainingDefinitions > 0) {
        document.getElementById('reviewTranslations').innerHTML += `<p style="color:#999;font-size:12px;">+ ${remainingDefinitions} more definitions</p>`;
      }

      if (examples.length > 0) {
        document.getElementById('examplesContent').innerHTML = examples.map(e => `
          <div class="example-item">
            <div class="example-sentence">${e.sentence}</div>
            ${e.translation ? `<div class="example-translation">${e.translation}</div>` : ''}
            <div class="example-domain">${e.domain}</div>
          </div>`).join('');
        document.getElementById('reviewExamples').style.display = 'block';
      } else {
        document.getElementById('examplesContent').innerHTML = '';
        document.getElementById('reviewExamples').style.display = 'none';
      }

      document.getElementById('completedCount').textContent = currentIndex;
      document.getElementById('reviewedCount').textContent = currentIndex;
      document.getElementById('remainingCount').textContent = currentReviewList.length - currentIndex - 1;
      document.getElementById('progressBar').style.width = ((currentIndex / currentReviewList.length) * 100) + '%';
      document.getElementById('playAudioBtn').onclick = () => playWordAudio(word.word);
    }

    function shouldRequeueToday(wordId, proficiencyLevel) {
      const score = scoreByLevel[proficiencyLevel] || 0;
      const previousScore = dailyScores.get(wordId) || 0;
      const nextScore = previousScore + score;
      dailyScores.set(wordId, nextScore);
      return nextScore < dailyThreshold;
    }

    function requeueCurrentWord(review, proficiencyLevel) {
      if (!shouldRequeueToday(review.word_id, proficiencyLevel)) {
        return;
      }

      const gap = requeueGapByLevel[proficiencyLevel] ?? 3;
      const insertAt = Math.min(currentIndex + gap, currentReviewList.length);
      currentReviewList.splice(insertAt, 0, review);
    }

    async function submitReview(proficiencyLevel) {
      const review = currentReviewList[currentIndex];
      try {
        const result = await APIClient.submitReview(review.word_id, proficiencyLevel);
        if (!result.success) throw new Error(result.error);
        currentIndex += 1;
        requeueCurrentWord(review, proficiencyLevel);
        document.getElementById('totalCount').textContent = currentReviewList.length;
        setTimeout(() => displayCurrentWord(), 300);
      } catch (error) {
        alert('Submit failed: ' + error.message);
      }
    }

    function showCompletionMessage() {
      document.getElementById('reviewContainer').style.display = 'none';
      document.getElementById('emptyState').innerHTML = `
        <div class="empty-state-icon">Done</div>
        <div class="empty-state-title">${reviewMode === 'new' ? "Today's new words are complete" : "Today's review is complete"}</div>
        <p>You finished everything in the queue.</p>
        <div style="margin-top:20px;">
          <button onclick="location.href='/'" class="btn btn-primary">Back Home</button>
        </div>`;
      document.getElementById('emptyState').style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
      await loadReviewList();
    });
  </script>
</body>
</html>
